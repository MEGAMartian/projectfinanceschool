function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return Promise.resolve(saved ? JSON.parse(saved) : defaultData);
  } catch { return Promise.resolve(defaultData); }
}
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

const BANNER_KEY = "pfs-banner-dismissed";
function SupportBanner({ alwaysShow }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (alwaysShow) { setVisible(true); return; }
    try {
      const last = localStorage.getItem(BANNER_KEY);
      const today = new Date().toDateString();
      if (last !== today) setVisible(true);
    } catch { setVisible(true); }
  }, [alwaysShow]);
  const dismiss = () => {
    setVisible(false);
    if (!alwaysShow) {
      try { localStorage.setItem(BANNER_KEY, new Date().toDateString()); } catch {}
    }
  };
  if (!visible) return null;
  return (
    <div style={{background:"#181c25",border:"1px solid #2a2e3f",borderRadius:"10px",padding:"1rem 1.25rem",marginBottom:"1.75rem",display:"flex",alignItems:"center",gap:"1.25rem",flexWrap:"wrap",position:"relative"}}>
      <button onClick={dismiss} style={{position:"absolute",top:".5rem",right:".6rem",background:"none",border:"none",color:"#3a3e55",cursor:"pointer",fontSize:"1rem",lineHeight:1,padding:"0"}}>×</button>
      <div style={{fontSize:"1.4rem",flexShrink:0}}>☕</div>
      <div style={{flex:1,minWidth:"200px"}}>
        <div style={{color:"#d4cfc5",fontSize:".85rem",fontWeight:600,marginBottom:".2rem"}}>Keep this reference guide current &amp; free</div>
        <div style={{color:"#5a5f78",fontSize:".78rem"}}>Tax rules change constantly. If this saves you time, please consider a small contribution.</div>
      </div>
      <div style={{display:"flex",gap:".6rem",flexWrap:"wrap",alignItems:"center",flexShrink:0}}>
        <a href="https://venmo.com/u/John-Marciano-13" target="_blank" rel="noreferrer"
          style={{display:"flex",alignItems:"center",gap:".4rem",background:"#008CFF",color:"#fff",borderRadius:"6px",padding:".4rem .9rem",fontWeight:700,fontSize:".78rem",textDecoration:"none",whiteSpace:"nowrap"}}>
          💙 Venmo
        </a>

      </div>
    </div>
  );
}

  const [filterType,setFilterType] = useState("all");

  const filtered = (sandbox.items||[]).filter(it =>
    (filterType==="all"||it.type===filterType) &&
    (!search || it.title.toLowerCase().includes(search.toLowerCase()) || (it.notes||"").toLowerCase().includes(search.toLowerCase()))
  );
  const addItem  = d => { onUpdate({...sandbox,items:[...(sandbox.items||[]),{id:uid(),...d}]}); setShowAdd(false); };
  const saveEdit = d => { onUpdate({...sandbox,items:sandbox.items.map(i=>i.id===editItem.id?{...i,...d}:i)}); setEditItem(null); };
  const del      = id => { if(!confirm("Remove this item?"))return; onUpdate({...sandbox,items:sandbox.items.filter(i=>i.id!==id)}); };

  return (
    <div>
      {showAdd  && <ItemModal onSave={addItem}  onClose={()=>setShowAdd(false)} />}
      {editItem && <ItemModal item={editItem} onSave={saveEdit} onClose={()=>setEditItem(null)} />}
      <div style={{display:"flex",alignItems:"center",gap:"1rem",marginBottom:"1.5rem"}}>
        <button onClick={onBack} style={{...btnGhost,padding:".4rem .8rem",fontSize:".8rem"}}>← Back</button>
        <div style={{width:12,height:12,borderRadius:"50%",background:sandbox.color,flexShrink:0}} />
        <h2 style={{margin:0,fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:"1.6rem",color:"#e8dcc8"}}>{sandbox.name}</h2>
        <button style={{...btnPrimary,marginLeft:"auto",padding:".45rem 1rem"}} onClick={()=>setShowAdd(true)}>+ Add Item</button>
      </div>
      {sandbox.description && <p style={{color:"#7a8099",fontSize:".88rem",marginBottom:"1.5rem",marginTop:"-1rem"}}>{sandbox.description}</p>}
      <div style={{display:"flex",gap:".75rem",marginBottom:"1.25rem",flexWrap:"wrap"}}>
        <input style={{...inputStyle,maxWidth:"260px"}} placeholder="Search items…" value={search} onChange={e=>setSearch(e.target.value)} />
        <select style={{...inputStyle,width:"auto"}} value={filterType} onChange={e=>setFilterType(e.target.value)}>
          <option value="all">All types</option>
          {ITEM_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
        </select>
      </div>
      {filtered.length===0
        ? <div style={{textAlign:"center",padding:"3rem",color:"#4a4f66",fontSize:".9rem"}}>No items yet — add some resources above.</div>
        : <div style={{display:"flex",flexDirection:"column",gap:".65rem"}}>
            {filtered.map(item => {
              const t = getTypeInfo(item.type);
              return (
                <div key={item.id} style={{background:"#181c25",border:"1px solid #2a2e3f",borderRadius:"8px",padding:"1rem 1.1rem",display:"flex",gap:"1rem",alignItems:"flex-start"}}>
                  <span style={{fontSize:"1.3rem",flexShrink:0,marginTop:".1rem"}}>{t.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"baseline",gap:".6rem",flexWrap:"wrap"}}>
                      {item.url ? <a href={item.url} target="_blank" rel="noreferrer" style={{color:"#e8dcc8",fontWeight:600,fontSize:".95rem",textDecoration:"none",borderBottom:"1px solid #c9913d"}}>{item.title}</a>
                        : <span style={{color:"#e8dcc8",fontWeight:600,fontSize:".95rem"}}>{item.title}</span>}
                      <span style={{fontSize:".7rem",color:"#555",letterSpacing:".05em",textTransform:"uppercase"}}>{t.label}</span>
                    </div>
                    {item.notes && <p style={{margin:".3rem 0 0",color:"#7a8099",fontSize:".83rem",lineHeight:1.5}}>{item.notes}</p>}
                    <div style={{fontSize:".72rem",color:"#444",marginTop:".4rem"}}>{item.date}</div>
                  </div>
                  <div style={{display:"flex",gap:".4rem",flexShrink:0}}>
                    <button onClick={()=>setEditItem(item)} style={{background:"none",border:"1px solid #2a2e3f",borderRadius:"5px",color:"#888",cursor:"pointer",padding:".25rem .55rem",fontSize:".75rem"}}>Edit</button>
                    <button onClick={()=>del(item.id)} style={{background:"none",border:"1px solid #2a2e3f",borderRadius:"5px",color:"#b85c5c",cursor:"pointer",padding:".25rem .55rem",fontSize:".75rem"}}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
      }
    </div>
  );
}

// ─── HNW Investor View ────────────────────────────────────────────────────────
const HNW_REFS = [
  // ── At-Risk – ITC Specific ────────────────────────────────────────────────
  { id:"h_49",    cat:"irc",    color:"#c9913d", citation:"§ 49",           title:"At-Risk Rules (ITC-Specific)",                       url:"https://www.law.cornell.edu/uscode/text/26/49",    notes:"Limits the ITC credit base to the amount the taxpayer has 'at risk' in the property. Applies to tax equity investors: non-recourse financing generally not at risk. Qualified non-recourse financing exception for real property does not apply to energy property. §49(b) expressly references and incorporates old §46(c)(7) for the definition of 'at risk' — you must read old §46(c)(7) to apply §49 correctly. Key threshold issue for HNW direct investors and partnership investors." },
  { id:"h_46c7",  cat:"irc_old",color:"#a06820", citation:"§ 46(c)(7) (OLD)", title:"At-Risk Rule – Pre-1986 Definition (Incorporated by §49)", url:"", notes:"Pre-TRA 1986 provision defining the 'at risk' concept for investment credit purposes. Expressly incorporated by reference into current §49(b). Under old §46(c)(7), the amount at risk for ITC purposes excluded non-recourse financing and amounts protected against loss by guarantees, stop-loss arrangements, or similar protections. This definition — not the general §465 definition — governs the §49 ITC at-risk limitation. Essential context for understanding how §49 applies to modern tax equity structures." },
  { id:"h_46old", cat:"irc_old",color:"#a06820", citation:"§ 46 (OLD)",     title:"Amount of Credit – Pre-1986 Investment Credit (Full Section)", url:"", notes:"Pre-TRA 1986 §46 governed the full investment credit regime. Subsections of direct relevance to HNW investors and current analysis: §46(c)(7) — at-risk rule (incorporated by §49); §46(c)(8) — leasing limitations; §46(e) — non-corporate lessor rule (see below). Treasury still relies on interpretations of old §46 for legacy transactions and to interpret current cross-references in §§49 and 50." },
  { id:"h_46e",   cat:"irc_old",color:"#a06820", citation:"§ 46(e) (OLD)",  title:"Non-Corporate Lessor Rule",                          url:"", notes:"Pre-TRA 1986 provision prohibiting non-corporate lessors — including individuals and partnerships — from claiming the investment credit on leased property unless two conditions were met: (1) the lease term was less than 50% of the property's useful life (net profit test), and (2) the lessor's net profit from the lease exceeded the ITC amount over the first 12 months. This rule prevented individuals and partnerships from structuring lease transactions solely to harvest ITC. Relevant today for: (a) interpreting legacy structures; (b) analogy to §50(b) limitations and §50(d)(5) passthrough election design; (c) understanding why tax equity structures moved toward partnership flips rather than leasing." },
  { id:"h_465",   cat:"irc",    color:"#c9913d", citation:"§ 465",          title:"At-Risk Limitations (General)",                      url:"https://www.law.cornell.edu/uscode/text/26/465",   notes:"Limits deductible losses to amounts at risk. Applies to tax equity investments in renewable energy partnerships. Amount at risk includes cash contributed and recourse debt; generally excludes non-recourse financing (with narrow exceptions). Coordinates with §469 passive activity rules — §465 is applied first. Note: §465 at-risk applies to loss deductions; §49 at-risk (via old §46(c)(7)) applies to the ITC credit base. The two at-risk concepts are related but not identical." },
  // ── Passive Activity ──────────────────────────────────────────────────────
  { id:"h_469",   cat:"irc",    color:"#5b8fb9", citation:"§ 469",          title:"Passive Activity Loss & Credit Rules",                url:"https://www.law.cornell.edu/uscode/text/26/469",   notes:"Limits passive activity losses and credits to amounts that can offset passive income. ITC and PTC from tax equity investments are generally passive activity credits — usable against passive income tax only (not active/portfolio). Material participation exception: HNW investor must meet one of 7 tests to avoid passive treatment. §469(d)(2) governs credit carryforward. §469(g): disposition of entire interest triggers suspended losses. Critical for HNW investors who lack other passive income." },
  { id:"h_469i",  cat:"irc",    color:"#5b8fb9", citation:"§ 469(i)",       title:"$25,000 Passive Activity Allowance (Real Estate)",    url:"https://www.law.cornell.edu/uscode/text/26/469",   notes:"Allows up to $25,000 of passive losses against non-passive income for active participation in rental real estate. Does not apply to tax credits from energy investments. Included for context — many HNW investors confuse this with energy credit treatment." },
  // ── §50 Interaction ───────────────────────────────────────────────────────
  { id:"h_50",    cat:"irc",    color:"#c9913d", citation:"§ 50",           title:"Other Special Rules – ITC Constraints on Investors",  url:"https://www.law.cornell.edu/uscode/text/26/50",    notes:"§50(a): recapture if property disposed of or ceases to be qualifying. §50(b): disallows ITC for tax-exempt use property, tax-exempt organizations, and governmental entities (see §6417 exception). §50(d): lease passthrough mechanics. §50(c): basis reduction by 50% of credit claimed — reduces depreciation deductions. Critical for HNW investors to understand recapture exposure over 5-year recapture period." },
  // ── Credit Transfer & Direct Pay ──────────────────────────────────────────
  { id:"h_6418",  cat:"irc",    color:"#4a9d7f", citation:"§ 6418",         title:"Transfer of Certain Credits",                        url:"https://www.law.cornell.edu/uscode/text/26/6418",  notes:"IRA 2022. HNW investors can purchase transferred tax credits (ITC/PTC) from project developers for cash. Key advantage: transferee acquires credits without passive activity constraints that apply to traditional tax equity — credits used against transferee's regular tax liability directly. No partnership required. Cash payment not deductible; credit not includible in income. Pre-filing registration required. OBBBA 2025: preserves transferability but prohibits transfer to specified foreign entities." },
  { id:"h_6417",  cat:"irc",    color:"#4a9d7f", citation:"§ 6417",         title:"Elective Payment (Direct Pay)",                      url:"https://www.law.cornell.edu/uscode/text/26/6417",  notes:"IRA 2022. Allows certain tax-exempt entities, state/local governments, tribal entities, and co-ops to treat applicable credits as tax refunds. Generally not available to HNW individual investors. Relevant context: illustrates policy backdrop for §6418 as alternative route for non-exempt taxpayers. Pre-filing registration via IRS Energy Credits Online portal required." },
  // ── Treasury Regulations – At-Risk ────────────────────────────────────────
  { id:"h_r465",  cat:"reg",    color:"#5b8fb9", citation:"Treas. Reg. § 1.465-1 et seq.",    title:"At-Risk Regulations",                url:"",  notes:"Treasury regulations under §465 governing at-risk amount computation, treatment of stop-loss arrangements, and interaction with partnership allocations. §1.465-24 addresses the at-risk rules for partners; §1.465-27 addresses qualified non-recourse financing. Critical for structuring HNW investor participation in tax equity partnerships." },
  // ── Treasury Regulations – Passive Activity (Temporary, EXPIRED ~1990-91) ──
  { id:"h_r469_1T", cat:"reg_temp", color:"#7e6bc4", citation:"Treas. Reg. § 1.469-1T",     title:"PAL Rules – Application (Temporary Reg., EXPIRED)",         url:"", notes:"Temporary regulation under §469 issued in 1987. Under §7805(e) (added by TRA 1986), temporary regs automatically expire after 3 years — these expired approximately 1990-91 and were never replaced by final regulations. Not operative as binding authority. Useful as evidence of IRS interpretive position and frequently referenced by practitioners and courts for that purpose, but a taxpayer (or auditor) cannot treat them as controlling law." },
  { id:"h_r469_2T", cat:"reg_temp", color:"#7e6bc4", citation:"Treas. Reg. § 1.469-2T",     title:"PAL Rules – Income, Loss & Rental Activity Definition (Temp., EXPIRED)", url:"", notes:"Temporary regulation (1987, expired ~1990-91 under §7805(e)) defining passive activity income, loss, and credits. Not operative as binding authority. Contains the rental activity definition in §1.469-2T(c): an activity is a rental activity if payments are received principally for the use of tangible property. Whether any specific project is a rental activity is entirely fact-specific — some renewable energy projects are rental activities; others are not. In an audit where the IRS relies on this regulation, two independent arguments are available: (1) the reg expired under §7805(e) and is not binding authority — it cannot be cited as controlling law; and (2) even if it were operative, the rental activity determination turns on the specific facts of the arrangement, including the direction of cash flows and who is receiving payment for the use of whose property. §1.469-2T(f): treatment of energy credits from passive activities." },
  { id:"h_r469_3T", cat:"reg_temp", color:"#7e6bc4", citation:"Treas. Reg. § 1.469-3T",     title:"PAL Rules – Passive Activity Credit Rules (Temp., EXPIRED)",url:"", notes:"Temporary regulation (1987, expired ~1990-91 under §7805(e)) governing passive activity credits including energy credits. Not operative as binding authority. Addresses: (1) how passive activity credits reduce tax on passive income; (2) credit carryforward rules; (3) treatment on disposition of passive activity; (4) coordination with §38 general business credit rules." },
  { id:"h_r469_4",  cat:"reg",      color:"#5b8fb9", citation:"Treas. Reg. § 1.469-4",      title:"PAL Rules – Definition of Activity / Grouping Rules (Final Reg.)", url:"", notes:"One of the few finalized §469 regulations — operative authority. Defines what constitutes a single 'activity' for passive activity purposes. Taxpayers may group multiple business operations or keep them separate. Grouping elections affect material participation analysis. Relevant for HNW investors with multiple energy investments." },
  { id:"h_r469_5T", cat:"reg_temp", color:"#7e6bc4", citation:"Treas. Reg. § 1.469-5T",     title:"PAL Rules – Material Participation Tests (Temp., EXPIRED)",  url:"", notes:"Temporary regulation (1987, expired ~1990-91 under §7805(e)) setting out the seven material participation tests. Not operative as binding authority but treated as the standard reference for material participation analysis in the absence of any final regulation. The seven tests: (1) 500+ hours; (2) substantially all participation; (3) 100+ hours, more than anyone else; (4) significant participation activities totaling 500+ hours; (5) material participation in 5 of last 10 years; (6) personal service activity, material participation in 3 prior years; (7) facts and circumstances, 100+ hours." },
  { id:"h_r469_11T",cat:"reg_temp", color:"#7e6bc4", citation:"Treas. Reg. § 1.469-11T",    title:"PAL Rules – Effective Dates & Transition (Temp., EXPIRED)",url:"", notes:"Temporary regulation (1987, expired ~1990-91 under §7805(e)) governing effective dates and transitional rules for §469. Not operative as binding authority. Relevant for understanding phased-in application and grandfather provisions for legacy tax equity structures." },
  { id:"h_7805e",   cat:"irc",      color:"#c9913d", citation:"§ 7805(e)",                   title:"3-Year Expiration Rule for Temporary Regulations",           url:"https://www.law.cornell.edu/uscode/text/26/7805", notes:"Added by Tax Reform Act of 1986. Provides that any temporary regulation issued after TRA 1986 expires within 3 years of issuance. The §469 temporary regulations were issued in 1987 and expired approximately 1990-91. Because no final regulations replaced them, there is no operative regulatory authority on most §469 issues — the statute and court decisions govern. The expired temp regs are useful evidence of IRS position but cannot be treated as controlling law by the IRS or by taxpayers." },
  { id:"h_prop469", cat:"nprm",     color:"#9b72cf", citation:"Prop. Reg. §§ 1.469-1, 1.469-2, 1.469-5 (REG-209040-88 et al.)", title:"§469 Proposed Regs – Never Finalized, Never Withdrawn",      url:"", notes:"Proposed regulations under §469 issued beginning in 1988 — also not operative as binding authority, but useful as additional evidence of IRS interpretive position. Never finalized, never withdrawn. Practitioners and IRS guidance continue to reference them on: self-rental recharacterization, former passive activities, interest expense allocation, and material participation computation details. The IRS has indicated taxpayers may rely on the proposed regs as a reasonable interpretation. Over 35 years of proposed-but-not-final status." },
  // ── Old §46 Regulations ───────────────────────────────────────────────────
  { id:"h_ro46_1",  cat:"reg_old",  color:"#a06820", citation:"Treas. Reg. § 1.46-1",        title:"Old §46 – Determination of Credit Amount",                  url:"", notes:"Regulation under pre-TRA 1986 §46. Governs the determination of the investment credit amount, including the at-risk rules under §46(c)(7). Key for interpreting §49's cross-reference to old §46(c)(7)." },
  { id:"h_ro46_4",  cat:"reg_old",  color:"#a06820", citation:"Treas. Reg. § 1.46-4",        title:"Old §46 – Limitations on Certain Persons (Non-Corporate Lessor)", url:"", notes:"Regulation under old §46(e). Implements the non-corporate lessor rule prohibiting individuals and partnerships from claiming the ITC on leased property unless the net profit test and lease term test were met. Provides detailed rules on computing the net profit and applying the lease term limitation. Still relevant for legacy transactions and for understanding the policy rationale behind current §50(b) and §50(d)(5) lease passthrough election design." },
  { id:"h_ro46_5",  cat:"reg_old",  color:"#a06820", citation:"Treas. Reg. § 1.46-5",        title:"Old §46 – Qualified Progress Expenditures",                  url:"", notes:"Regulation on progress expenditure credits under old §46(d). Relevant for long-construction-period assets that straddled TRA 1986, and for understanding how the IRS treated multi-year construction projects under the old ITC regime." },
  // ── Key Guidance: 6417/6418 NPRM and Final Regs ──────────────────────────
  { id:"h_nprm",  cat:"nprm",   color:"#9b72cf", citation:"REG-101610-23 (Prop. Reg. §§ 1.6417-1, 1.6418-1)",  title:"Elective Pay & Credit Transfer – NPRM (June 2023)", url:"https://www.federalregister.gov/documents/2023/06/21/2023-13220/elective-payment-of-applicable-credits-and-transfer-of-certain-credits", notes:"Federal Register NPRM (88 FR 40528, June 21, 2023). Proposed regulations on §§6417/6418. Preamble contains substantive IRS commentary on: (1) interaction of credit transfers with §469 passive activity rules — IRS position that §6418 transfers are not subject to PAL limitations at the transferee level; (2) §465 at-risk treatment for transferees; (3) §49 basis and at-risk interaction; (4) §50 recapture exposure for transferors vs. transferees. Essential reading for HNW investors considering credit purchases vs. traditional tax equity." },
  { id:"h_td9993",cat:"reg",    color:"#5b8fb9", citation:"T.D. 9993 (Treas. Reg. §§ 1.6417-1, 1.6418-1 et seq.)", title:"Elective Pay & Credit Transfer – Final Regs (Mar. 2024)", url:"https://www.federalregister.gov/documents/2024/03/11/2024-04848/elective-payment-of-applicable-credits-and-transfer-of-certain-credits", notes:"Final regulations on §§6417 and 6418. Preamble responds to NPRM comments on §§49, 465, 469, and 50 interaction. IRS confirms: transferees of credits under §6418 are not subject to §469 passive activity limitations — credits are used against transferee's regular tax liability directly. Key advantage of credit purchase structure over traditional tax equity for HNW investors with limited passive income." },
  // ── Rev. Proc. / Structuring Context ─────────────────────────────────────
  { id:"h_rp0765",cat:"revproc",color:"#c2778a", citation:"Rev. Proc. 2007-65",  title:"Wind Partnership Flip – At-Risk & Passive Activity Context", url:"https://www.irs.gov/pub/irs-drop/rp-07-65.pdf", notes:"Safe harbor for wind partnership flips. Requires tax equity investor to have 5% IRR and hold ≥1% interest. Structures must satisfy §§49, 465, and 469. Safe harbor implicitly assumes investor has passive income to absorb credits — HNW investors with no other passive income may find §469 limitations problematic in traditional flip structures, making §6418 credit purchase an attractive alternative." },
  { id:"h_rp1412",cat:"revproc",color:"#c2778a", citation:"Rev. Proc. 2014-12",  title:"Inverted Lease – Investor Constraint Interaction",           url:"https://www.irs.gov/pub/irs-drop/rp-14-12.pdf", notes:"Inverted lease safe harbor. Lessor (investor) claims ITC and then leases property back to lessee/developer. Investor subject to §§49 and 50. §469 passive activity rules apply to investor's share of lease income and credit. Structure requires careful analysis of investor's passive income position. Non-recourse lease obligations may affect §465 at-risk amount." },
];

        <div style={{fontSize:"1.8rem",flexShrink:0}}>👋</div>
        <div style={{flex:1,minWidth:"200px"}}>
          <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:"1.1rem",color:"#e8dcc8",fontWeight:600,marginBottom:".3rem"}}>Attending Infocast in Arizona?</div>
          <div style={{color:"#7a8099",fontSize:".85rem",lineHeight:1.5}}>Come say hello — always happy to explain ITCs for satellites and data centers. You heard right.</div>
        </div>
        <a href="mailto:john@orbit.tax" style={{flexShrink:0,background:"#c9913d",color:"#0f1219",borderRadius:"7px",padding:".55rem 1.25rem",fontWeight:700,fontSize:".85rem",textDecoration:"none",letterSpacing:".02em",whiteSpace:"nowrap"}}>john@orbit.tax</a>
      </div>

      {/* Header */}
      <div style={{marginBottom:"2rem"}}>
        <div style={{display:"inline-block",padding:".25rem .75rem",borderRadius:"4px",background:"#5b8fb922",border:"1px solid #5b8fb955",color:"#5b8fb9",fontSize:".72rem",fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",marginBottom:"1rem"}}>
          High Net Worth Investor Reference
        </div>
        <h2 style={{margin:"0 0 .5rem",fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:"1.9rem",color:"#e8dcc8"}}>Investor Constraints &amp; Credit Access</h2>
        <p style={{margin:"0 0 1.25rem",color:"#7a8099",fontSize:".9rem",lineHeight:1.7,maxWidth:"720px"}}>
          Five provisions define the constraint set for HNW investors in renewable energy tax credit transactions. Know all five — they interact, they have different scopes, and the analysis changes depending on the structure:
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:".6rem",marginBottom:"1.25rem",maxWidth:"820px"}}>
          {[
            ["§ 465","At-Risk Limitations (Losses)","Limits loss deductions to amounts at risk. Applies to individuals, trusts, S corporations, and closely held C corporations (and personal service corporations) — each with exceptions. §49 and §469 reference §465 to define who is subject to those rules, so the three provisions generally apply to the same taxpayer population. Does not apply to §6418 credit transfer buyers.","#c9913d"],
            ["§ 49 / Old § 46(c)(7)","At-Risk Limitation (ITC Credit Base)","Limits the ITC credit base to the taxpayer's at-risk amount. §49(a)(1) expressly applies to taxpayers subject to §465 — so the taxpayer scope is the same as §465. The at-risk definitions and exceptions differ between §49 and §465, however — know both. §49 applies to §6418 credit transfers: run the at-risk traps on both the seller (transferor) and the buyer (transferee). Do not skip §49 in credit transfer deals.","#c9913d"],
            ["§ 469","Passive Activity Rules (Credits & Losses)","Limits credits and losses to amounts that can offset passive income or income from activities in which the taxpayer materially participates. Applies to individuals, estates, trusts, closely held C corporations, and personal service corporations — referencing §465 for the taxpayer definition, so largely the same population. Applies to §6418 credit transfer buyers — the buyer must analyze their own passive activity position. Does not disappear because the credit is purchased rather than earned.","#5b8fb9"],
            ["Non-Corporate Lessor Rule (Old § 46(e))","C Corporations Only May Lease","Old §46(e) disqualified non-corporate lessors from claiming the ITC on leased property. 'Non-corporate' means everyone except C corporations — individuals, partnerships, LLCs, and S corporations are all non-corporate for this purpose. S corporations are pass-through entities and are not treated as corporations under §46(e). Unless two narrow tests were met (net profit test and lease term test), non-corporate lessors could not claim the credit. Know this before structuring any leasing arrangement as a non-C-corp entity.","#a06820"],
            ["§ 6418","Credit Transfer — Which Constraints Apply","§6418 changes the analysis but does not eliminate it. §465: does not apply to the transferee buyer. §469: applies to the buyer — analyze the buyer's passive activity position. §49: applies to both the seller (transferor) and the buyer (transferee) — do not forget this step. The taxpayer scope for §§465, 49, and 469 is the same group, so if the buyer is in scope for one, they are generally in scope for all three. Non-corporate lessor rule: applies at the project level regardless of how credits are monetized.","#4a9d7f"],
          ].map(([cite,title,desc,color])=>(
            <div key={cite} style={{background:"#181c25",border:"1px solid #22263a",borderLeft:`3px solid ${color}88`,borderRadius:"0 8px 8px 0",padding:"1rem 1.1rem"}}>
              <div style={{display:"flex",alignItems:"baseline",gap:".75rem",marginBottom:".35rem",flexWrap:"wrap"}}>

                <span style={{color:"#9aa0bc",fontSize:".85rem",fontWeight:600}}>{title}</span>
              </div>
              <div style={{color:"#4e5570",fontSize:".78rem",lineHeight:1.6}}>{desc}</div>
            </div>
          ))}
        </div>
        <div style={{background:"#181c25",border:"1px solid #c9913d44",borderLeft:"3px solid #c9913d",borderRadius:"0 8px 8px 0",padding:"1rem 1.25rem",marginBottom:"1.5rem",maxWidth:"720px"}}>
          <div style={{fontWeight:600,color:"#c9913d",fontSize:".82rem",marginBottom:".3rem"}}>§6418 Credit Purchase vs. Traditional Tax Equity — What Changes, What Doesn't</div>
          <div style={{color:"#7a8099",fontSize:".82rem",lineHeight:1.6}}>Under traditional tax equity (partnership flip / inverted lease), the investor's credits are passive — usable only against passive income, subject to §§465, 49, and 469. Under §6418, the buyer purchases credits for cash and those credits offset regular tax liability directly. <strong style={{color:"#d4cfc5"}}>What changes:</strong> §465 does not apply to the transferee buyer. <strong style={{color:"#d4cfc5"}}>What does not change:</strong> §469 still applies — analyze the buyer's passive activity position. §49 still applies — run the at-risk traps on both the seller and the buyer; do not skip this step. The final regs (T.D. 9993) confirm the §469 treatment for transferees. Key tradeoff: the buyer has no ownership stake in the project, so there is no upside beyond the credit discount.</div>
        </div>

        {/* Filters */}
        <div style={{display:"flex",gap:".65rem",flexWrap:"wrap"}}>
          <input style={{...inputStyle,maxWidth:"240px"}} placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)} />
          <select style={{...inputStyle,width:"auto"}} value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
            <option value="all">All types</option>
            {Object.entries(HNW_CAT_INFO).map(([v,{label}])=><option key={v} value={v}>{label}</option>)}
          </select>
        </div>
      </div>

      {/* Reference cards */}
      <div style={{display:"flex",flexDirection:"column",gap:".6rem"}}>
        {filtered.map(ref => {
          const cat = HNW_CAT_INFO[ref.cat] || {label:"Other",color:"#888"};
          return (
            <div key={ref.id} style={{background:"#181c25",border:"1px solid #22263a",borderLeft:`3px solid ${cat.color}88`,borderRadius:"0 8px 8px 0",padding:"1rem 1.1rem"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:"1rem",flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:"240px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:".6rem",marginBottom:".35rem",flexWrap:"wrap"}}>
                    <span style={{display:"inline-block",padding:".15rem .5rem",borderRadius:"4px",background:cat.color+"22",border:`1px solid ${cat.color}44`,color:cat.color,fontSize:".68rem",fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",flexShrink:0}}>{cat.label}</span>
                    <code style={{color:cat.color,fontFamily:"'JetBrains Mono','Fira Mono',monospace",fontSize:".85rem",fontWeight:700}}>
                      {ref.url ? <a href={ref.url} target="_blank" rel="noreferrer" style={{color:"inherit",textDecoration:"none",borderBottom:`1px solid ${cat.color}55`}}>{ref.citation}</a> : ref.citation}
                    </code>
                  </div>
                  {ref.title && <div style={{color:"#9aa0bc",fontSize:".84rem",fontWeight:600,marginBottom:".35rem"}}>{ref.title}</div>}
                  {ref.notes && <div style={{color:"#4e5570",fontSize:".78rem",lineHeight:1.55}}>{ref.notes}</div>}
                </div>
              </div>
            </div>
          );
        })}
        {filtered.length===0 && <div style={{textAlign:"center",padding:"3rem",color:"#4a4f66",fontSize:".9rem"}}>No references found.</div>}
      </div>

      {/* Sandbox coming soon note */}
      <div style={{marginTop:"2.5rem",background:"#181c25",border:"1px solid #2a2e3f",borderRadius:"8px",padding:"1.1rem 1.4rem"}}>
        <p style={{margin:0,color:"#3e4460",fontSize:".78rem",lineHeight:1.6}}>
          <strong style={{color:"#4a4f66"}}>Coming soon:</strong> HNW Investor sandbox with investor qualification checklists, constraints matrix, and deal screening tools — accessible from the Sandboxes tab. Questions? <a href="mailto:john@orbit.tax" style={{color:"#c9913d",textDecoration:"none"}}>john@orbit.tax</a>
        </p>
      </div>
    </div>
  );
}

        <button style={btnPrimary} onClick={()=>setShowAdd(true)}>+ Add Reference</button>
      </div>

      <div style={{display:"flex",gap:".65rem",marginBottom:"1.5rem",flexWrap:"wrap"}}>
        <input style={{...inputStyle,maxWidth:"240px"}} placeholder="Search citations, titles…" value={search} onChange={e=>setSearch(e.target.value)} />
        <select style={{...inputStyle,width:"auto"}} value={filterGroup} onChange={e=>{setFilterGroup(e.target.value);setFilterCat("all");}}>
          <option value="all">All groups</option>
          {GROUPS.map(g=><option key={g} value={g}>{g}</option>)}
        </select>
        <select style={{...inputStyle,width:"auto"}} value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
          <option value="all">All types</option>
          {(filterGroup==="all"?REF_CATEGORIES:REF_CATEGORIES.filter(c=>c.group===filterGroup)).map(c=>(
            <option key={c.value} value={c.value}>{c.label}</option>
          ))}
        </select>
      </div>

      {byGroup.length===0
        ? <div style={{textAlign:"center",padding:"3rem",color:"#4a4f66",fontSize:".9rem"}}>No references found.</div>
        : <div style={{display:"flex",flexDirection:"column",gap:"2.25rem"}}>
            {byGroup.map(({group,cats})=>(
              <div key={group}>
                <div style={{display:"flex",alignItems:"center",gap:"1rem",marginBottom:"1rem"}}>
                  <h3 style={{margin:0,fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:"1.05rem",color:"#6a7090",letterSpacing:".08em",textTransform:"uppercase"}}>{group}</h3>
                  <div style={{flex:1,height:"1px",background:"#1a1e2e"}} />
                  <span style={{fontSize:".72rem",color:"#3a3f55"}}>{cats.reduce((a,c)=>a+c.refs.length,0)}</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:"1.1rem"}}>
                  {cats.map(cat=>{
                    const isCollapsed = collapsed[cat.value];
                    return (
                      <div key={cat.value}>
                        <div style={{display:"flex",alignItems:"center",gap:".6rem",marginBottom:".55rem",cursor:"pointer",userSelect:"none"}} onClick={()=>toggle(cat.value)}>
                          <span style={{display:"inline-block",padding:".18rem .55rem",borderRadius:"4px",background:cat.color+"22",border:`1px solid ${cat.color}55`,color:cat.color,fontSize:".7rem",fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",flexShrink:0}}>{cat.short}</span>
                          <span style={{color:"#7a8099",fontSize:".86rem"}}>{cat.label}</span>
                          <span style={{fontSize:".7rem",color:"#3a3f55"}}>({cat.refs.length})</span>
                          <div style={{flex:1,height:"1px",background:"#181c25"}} />
                          <span style={{color:"#3a3f55",fontSize:".75rem",display:"inline-block",transform:isCollapsed?"rotate(-90deg)":"rotate(0deg)",transition:"transform .15s"}}>▾</span>
                        </div>
                        {!isCollapsed && (
                          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:".5rem",paddingLeft:".75rem"}}>
                            {cat.refs.map(ref=>(
                              <div key={ref.id} style={{background:"#181c25",border:"1px solid #22263a",borderLeft:`3px solid ${cat.color}66`,borderRadius:"0 7px 7px 0",padding:".65rem .85rem",display:"flex",flexDirection:"column",gap:".3rem",position:"relative"}}>
                                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:".5rem"}}>
                                  <code style={{color:cat.color,fontFamily:"'JetBrains Mono','Fira Mono',monospace",fontSize:".82rem",fontWeight:700,lineHeight:1.3,flex:1,minWidth:0}}>
                                    {ref.url ? <a href={ref.url} target="_blank" rel="noreferrer" style={{color:"inherit",textDecoration:"none",borderBottom:`1px solid ${cat.color}55`}}>{ref.citation}</a> : ref.citation}
                                  </code>
                                  <div style={{display:"flex",gap:".25rem",flexShrink:0}}>
                                    <button onClick={()=>setEditRef(ref)} style={{background:"none",border:"1px solid #22263a",borderRadius:"4px",color:"#555",cursor:"pointer",padding:".15rem .4rem",fontSize:".68rem",lineHeight:1}}>✏</button>
                                    <button onClick={()=>del(ref.id)}    style={{background:"none",border:"1px solid #22263a",borderRadius:"4px",color:"#7a3535",cursor:"pointer",padding:".15rem .4rem",fontSize:".68rem",lineHeight:1}}>✕</button>
                                  </div>
                                </div>
                                {ref.title && <span style={{color:"#7a8099",fontSize:".78rem",lineHeight:1.35}}>{ref.title}</span>}
                                {ref.notes && <p style={{margin:0,color:"#3e4460",fontSize:".73rem",lineHeight:1.45}}>{ref.notes}</p>}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
      }
    </div>
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────
function App() {
  const [data,           setData]           = useState(null);
  const [view,           setView]           = useState("book");
  const [activeSandbox,  setActiveSandbox]  = useState(null);
  const [showAddSandbox, setShowAddSandbox] = useState(false);
  const [editSandbox,    setEditSandbox]    = useState(null);

  useEffect(()=>{ loadData().then(d=>setData(d)); },[]);
  const persist = useCallback(d=>{ setData(d); saveData(d); },[]);

  if (!data) return <div style={{minHeight:"100vh",background:"#0f1219",display:"flex",alignItems:"center",justifyContent:"center",color:"#555",fontFamily:"system-ui"}}>Loading…</div>;

  const createSandbox = f => { persist({...data,sandboxes:[...data.sandboxes,{id:uid(),items:[],...f}]}); setShowAddSandbox(false); };
  const updateSandbox = f => { persist({...data,sandboxes:data.sandboxes.map(s=>s.id===editSandbox.id?{...s,...f}:s)}); setEditSandbox(null); };
  const deleteSandbox = id => {
    if(!confirm("Delete this sandbox and all its items?"))return;
    persist({...data,sandboxes:data.sandboxes.filter(s=>s.id!==id)});
    if(activeSandbox?.id===id) setActiveSandbox(null);
  };
  const updateSandboxItems = sb => { persist({...data,sandboxes:data.sandboxes.map(s=>s.id===sb.id?sb:s)}); setActiveSandbox(sb); };
  const updateRefs = refs => persist({...data,quickRefs:refs});

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        *{box-sizing:border-box;} body{margin:0;}
        ::-webkit-scrollbar{width:6px;height:6px;}
        ::-webkit-scrollbar-track{background:#0f1219;}
        ::-webkit-scrollbar-thumb{background:#2a2e3f;border-radius:3px;}
        select option,select optgroup{background:#181c25;color:#d4cfc5;}
      `}</style>

      {showAddSandbox && <SandboxModal onSave={createSandbox} onClose={()=>setShowAddSandbox(false)} />}
      {editSandbox    && <SandboxModal sandbox={editSandbox} onSave={updateSandbox} onClose={()=>setEditSandbox(null)} />}

      <div style={{minHeight:"100vh",background:"#0f1219",color:"#d4cfc5",fontFamily:"system-ui,-apple-system,sans-serif",display:"flex",flexDirection:"column"}}>
        <header style={{borderBottom:"1px solid #1e2235",padding:"0 2rem",display:"flex",alignItems:"center",height:"60px",gap:"2rem",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"baseline",gap:".5rem"}}>
            <span style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:"1.4rem",fontWeight:700,color:"#c9913d",letterSpacing:".04em"}}>ProjectFinance</span>
            <span style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:"1.4rem",color:"#e8dcc8",letterSpacing:".02em"}}>.School</span>
          </div>
          <nav style={{display:"flex",gap:".25rem",marginLeft:"auto"}}>
            {[["book","📖 The Book"],["sandboxes","Sandboxes"],["refs","Quick Reference"],["hnw","🏦 HNW Investor"]].map(([v,label])=>(
              <button key={v} onClick={()=>{setView(v);setActiveSandbox(null);}}
                style={{background:view===v?"#181c25":"transparent",border:view===v?"1px solid #2a2e3f":"1px solid transparent",borderRadius:"6px",color:view===v?"#e8dcc8":"#5a5f78",padding:".4rem .9rem",cursor:"pointer",fontSize:".83rem",fontWeight:view===v?600:400,transition:"all .15s"}}>
                {label}
              </button>
            ))}
          </nav>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#4a9d7f",flexShrink:0,marginLeft:".5rem"}} title="Data saved locally" />
        </header>

        <main style={{flex:1,padding:"2rem",maxWidth:"1100px",width:"100%",margin:"0 auto"}}>
          {view==="book" && <BookView />}
          {view==="hnw" && <HNWView />}
          {view==="sandboxes"&&!activeSandbox && <SandboxesView sandboxes={data.sandboxes} onOpenSandbox={setActiveSandbox} onAddSandbox={()=>setShowAddSandbox(true)} onEditSandbox={setEditSandbox} onDeleteSandbox={deleteSandbox} />}
          {view==="sandboxes"&&activeSandbox  && <SandboxDetail sandbox={data.sandboxes.find(s=>s.id===activeSandbox.id)||activeSandbox} onBack={()=>setActiveSandbox(null)} onUpdate={updateSandboxItems} />}
          {view==="refs" && <QuickRefView quickRefs={data.quickRefs} onUpdate={updateRefs} />}
        </main>

        <footer style={{borderTop:"1px solid #1a1e2e",padding:".75rem 2rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:".72rem",color:"#2e3244",letterSpacing:".05em"}}>DATA SAVED IN BROWSER · PRIVATE TO THIS DEVICE</span>
          <span style={{fontSize:".72rem",color:"#2e3244"}}>{data.sandboxes.length} sandbox{data.sandboxes.length!==1?"es":""} · {data.sandboxes.reduce((a,s)=>a+(s.items||[]).length,0)} items · {data.quickRefs.length} references</span>
        </footer>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
</body>
</html>
